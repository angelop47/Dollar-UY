name: Registro Cotizaciones BROU

on:
  schedule:
    - cron: '*/15 13-21 * * 1-5' # Cada 15 min entre las 10:00 y 18:00 UY (UTC-3)
  workflow_dispatch:

permissions:
  contents: write

env:
  DEBIAN_FRONTEND: noninteractive
  PLAYWRIGHT_BROWSERS_PATH: /opt/playwright-browsers

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: /opt/playwright-browsers
          key: playwright-browsers-v1

      - name: Install dependencies
        run: npm ci

      - name: Install system deps (only if cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libdbus-1-3 libatk1.0-0 \
            libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2

      - name: Install Playwright Chromium
        run: |
          npx playwright install --only-shell chromium || \
          npx playwright install chromium

      - name: Run scraper
        run: node scrape.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cotizaciones.csv scraper.log
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualizar cotizaciones y logs $(TZ='America/Montevideo' date +'%Y-%m-%d %H:%M')" && git push)
