name: Registro Cotizaciones BROU

on:
  schedule:
    - cron: '*/30 13-21 * * 1-5' # Cada 30 min entre las 10:00 y 18:00 UY (UTC-3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: node scrape.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cotizaciones.csv scraper.log
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualizar cotizaciones y logs $(TZ='America/Montevideo' date +'%Y-%m-%d %H:%M')" && git push)
